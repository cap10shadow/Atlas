spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

atlas:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 43200000
    issuer: atlas
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}

logging:
  level:
    com.atlas: INFO
