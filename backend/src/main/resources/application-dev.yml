spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:atlas}
    username: ${DB_USERNAME:atlas}
    password: ${DB_PASSWORD:atlas}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

atlas:
  jwt:
    secret: ${JWT_SECRET:atlas-dev-only-jwt-signing-secret-do-not-use-in-production-1234567890}
    expiration-ms: 43200000
    issuer: atlas
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

logging:
  level:
    com.atlas: DEBUG
