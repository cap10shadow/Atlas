spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:atlas}
    username: ${DB_USERNAME:atlas}
    password: ${DB_PASSWORD:atlas}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

atlas:
  jwt:
    secret: atlas-test-only-jwt-signing-secret-do-not-use-in-production-0987654321
    expiration-ms: 43200000
    issuer: atlas
  cors:
    allowed-origin: http://localhost:3000
